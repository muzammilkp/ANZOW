<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANZOW | Premium Menswear</title>
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/yYp1LTLL/logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --lp-navy: #0e1b29; 
            --lp-gold: #a68966; 
            --text-dark: #1a1a1a;
            --heart-red: #d43f33;
            --bg-light: #f8f8f8;
        }
        
        * { box-sizing: border-box; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        
        body { 
            margin: 0; font-family: 'Lato', sans-serif; 
            background: #ffffff; color: var(--text-dark);
            overflow-x: hidden; letter-spacing: 0.5px;
        }

        /* Header */
        header { 
            background: rgba(255, 255, 255, 0.98); padding: 15px 5%; 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee;
            backdrop-filter: blur(10px);
        }
        .brand-block { display: flex; align-items: center; text-decoration: none; color: inherit; }
        .brand-block img { height: 38px; margin-right: 15px; border-radius: 50%; }
        .brand-name { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; letter-spacing: 6px; color: var(--lp-navy); }
        
        .header-controls { display: flex; align-items: center; gap: 25px; }
        .search-input {
            border: none; border-bottom: 1px solid #ddd;
            padding: 8px 5px; font-family: 'Lato'; font-size: 11px;
            text-transform: uppercase; letter-spacing: 1px; outline: none; width: 140px;
            background: transparent;
        }
        .search-input:focus { border-bottom: 1px solid var(--lp-gold); width: 180px; }

        .nav-link { 
            text-decoration: none; color: #111; font-size: 11px; font-weight: 700; 
            text-transform: uppercase; cursor: pointer; letter-spacing: 2.5px;
        }

        /* Hero Slider Area */
        .hero-viewport { 
            width: 100%; height: 550px; position: relative; overflow: hidden; background: #fff; 
        }
        .hero-slide { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            opacity: 0; display: flex; align-items: center; justify-content: center;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
            transform: scale(1.1); /* Zoom effect added */
            transition: opacity 1.2s ease-in-out, transform 4s ease-out;
        }
        .hero-slide.active { 
            opacity: 1; 
            z-index: 2; 
            transform: scale(1.0); /* Zoom out effect added */
        }
        
        .hero-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%;
            text-align: center; color: var(--lp-navy); background: linear-gradient(transparent, rgba(255,255,255,0.8)); 
            padding: 40px 20px;
        }
        .hero-overlay h2 { 
            font-family: 'Cinzel'; font-size: 28px; margin: 0; letter-spacing: 6px; 
            text-transform: uppercase;
        }

        /* Auth/Wishlist Overlay */
        #auth-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fff; z-index: 3000; display: none; padding: 60px 5%; overflow-y: auto;
        }
        .auth-card { max-width: 700px; margin: 0 auto; text-align: center; }
        .auth-input { width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; background: var(--bg-light); outline: none; }
        .btn-main { width: 100%; padding: 20px; background: var(--lp-navy); color: white; border: none; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 3px; }
        .btn-outline { background: transparent; border: 1px solid var(--lp-navy); color: var(--lp-navy); margin-top: 20px;}

        /* Product Detail Overlay */
        #product-detail-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(255,255,255,0.98); z-index: 4000; 
            display: none; padding: 40px 5%; overflow-y: auto;
        }
        .detail-container { 
            max-width: 1000px; margin: 0 auto; display: grid; 
            grid-template-columns: 1fr 1fr; gap: 40px; align-items: start;
        }
        .detail-img img { width: 100%; border-radius: 4px; }
        .detail-info { text-align: left; }
        .size-selector { display: flex; gap: 10px; margin: 25px 0; }
        .size-btn { 
            padding: 10px 20px; border: 1px solid #ddd; cursor: pointer; 
            font-size: 12px; font-weight: 700; transition: 0.2s;
        }
        .size-btn.selected { background: var(--lp-navy); color: #fff; border-color: var(--lp-navy); }
        .close-detail { 
            position: fixed; top: 20px; right: 30px; font-size: 30px; 
            cursor: pointer; font-weight: 300; z-index: 4001; 
        }

        /* Products Grid */
        .section-title { font-family: 'Cinzel'; text-align: center; margin: 60px 0 40px; letter-spacing: 8px; font-size: 18px; color: var(--lp-navy); font-weight: 400; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 45px; padding: 0 5%; max-width: 1600px; margin: 0 auto; }
        
        /* Shimmer Loading Effect Added */
        @keyframes shimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        .img-box { 
            height: 400px; position: relative; overflow: hidden; 
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%;
            animation: shimmer 1.5s infinite linear;
        }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .offer-badge {
            position: absolute; top: 15px; left: 0; background: var(--lp-gold);
            color: white; padding: 5px 12px; font-size: 10px; font-weight: 700; z-index: 5;
            text-transform: uppercase;
        }

        .heart-btn {
            position: absolute; top: 15px; right: 15px; 
            width: 32px; height: 32px; display: flex;
            align-items: center; justify-content: center; 
            cursor: pointer; z-index: 10;
            background: transparent;
        }
        .heart-btn svg {
            width: 22px; height: 22px;
            fill: transparent;
            stroke: #000;
            stroke-width: 1.5px;
            transition: all 0.3s ease;
        }
        .heart-btn.active svg {
            fill: var(--heart-red);
            stroke: var(--heart-red);
        }

        .details { padding: 20px 0; text-align: center; }
        .p-name { font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: #333; height: 34px; overflow: hidden; font-weight: 400; letter-spacing: 1px;}
        .p-price { font-size: 15px; font-weight: 700; color: var(--lp-navy); }
        .old-price { text-decoration: line-through; color: #bbb; font-size: 12px; margin-left: 8px; font-weight: 300; }
        
        .order-btn { 
            display: block; width: 100%; border: 1px solid #111; color: #111; 
            text-decoration: none; padding: 14px; font-size: 10px; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 2px; margin-top: 15px;
            cursor: pointer; background: transparent;
        }
        .order-btn:hover { background: #000; color: #fff; }

        /* Wishlist Items */
        .wishlist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 40px; text-align: left; }
        .wish-item { background: var(--bg-light); padding: 15px; display: flex; gap: 20px; align-items: center; position: relative; }
        .wish-item img { width: 70px; height: 90px; object-fit: cover; }

        footer { padding: 80px 5%; background: #000; color: #555; text-align: center; font-size: 11px; margin-top: 80px; letter-spacing: 2px;}

        @media (max-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .img-box { height: 250px; }
            .hero-viewport { height: 400px; }
            .hero-overlay h2 { font-size: 16px; letter-spacing: 4px; }
            .wishlist-grid { grid-template-columns: 1fr; }
            .detail-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-card" id="auth-container"></div>
    </div>

    <!-- Product Detail Overlay -->
    <div id="product-detail-overlay">
        <span class="close-detail" onclick="closeProductDetail()">&times;</span>
        <div class="detail-container" id="detail-content"></div>
    </div>

    <header>
        <a href="#" class="brand-block">
            <img src="https://i.postimg.cc/yYp1LTLL/logo.jpg" alt="ANZOW">
            <span class="brand-name">ANZOW</span>
        </a>
        <div class="header-controls">
            <input type="text" id="searchInput" class="search-input" placeholder="SEARCH..." onkeyup="handleSearch()">
            <div class="nav-link" id="acc-label" onclick="toggleAuth(true)">ACCOUNT</div>
        </div>
    </header>

    <!-- Top Sliding Section -->
    <div class="hero-viewport" id="hero-slider"></div>

    <h3 class="section-title">THE 2026 COLLECTION</h3>

    <main>
        <div class="product-grid" id="grid"></div>
    </main>

    <footer>
        <b style="color: #fff; font-size: 14px; letter-spacing: 4px;">ANZOW PREMIUM MENSWEAR</b><br><br>
        VALAKKAI, THALIPARAMBA, KANNUR, KERALA<br>
        CURATED FOR THE DISCERNING GENTLEMAN &copy; 2026
    </footer>

    <script>
        const products = [
            { id: 1, name: "Regal White Classic Shirt", old: 1499, price: 499, img: "https://i.postimg.cc/0Qn9gGCx/download.jpg" },
            { id: 2, name: "Premium Slim Fit Trousers", old: 1999, price: 699, img: "https://i.postimg.cc/kG5q7VTL/sde9.jpg" },
            { id: 3, name: "Navy Executive Cotton Polo", old: 999, price: 350, img: "https://i.postimg.cc/SRKkmXgB/side8.jpg" },
            { id: 4, name: "Micro-Print Formal Wear", old: 1299, price: 550, img: "https://i.postimg.cc/DZ67VQc2/slide1-jpg.jpg" },
            { id: 5, name: "Urban Dusk Casual Shirt", old: 1599, price: 650, img: "https://i.postimg.cc/2y5rCqH8/slide10.jpg" },
            { id: 6, name: "Ivory Luxe Summer Shirt", old: 1399, price: 499, img: "https://i.postimg.cc/VvNmzS7y/slide2-jpg.jpg" },
            { id: 7, name: "Midnight Shadow Formal", old: 1899, price: 799, img: "https://i.postimg.cc/Rh04v3Pm/slide3.jpg" },
            { id: 8, name: "Classic Azure Button-Down", old: 1200, price: 450, img: "https://i.postimg.cc/C5KSwZvg/slide4.jpg" },
            { id: 9, name: "Saffron Street Casuals", old: 1100, price: 399, img: "https://i.postimg.cc/vTmbG1PM/slide5.jpg" },
            { id: 10, name: "Olive Drape Smart Shirt", old: 1450, price: 599, img: "https://i.postimg.cc/3NwY3yLY/slide6.jpg" },
            { id: 11, name: "Slate Grey Essential", old: 999, price: 349, img: "https://i.postimg.cc/0jNP96t5/slide7.jpg" },
            { id: 12, name: "Heritage Linen Blend", old: 2199, price: 899, img: "https://i.postimg.cc/bY1BvY77/download-(1).jpg" },
            { id: 13, name: "Oxford Blue Corporate", old: 1699, price: 649, img: "https://i.postimg.cc/FF0BKsth/download-(3).jpg" },
            { id: 14, name: "Modern Fit Gingham", old: 1399, price: 550, img: "https://i.postimg.cc/7PSWLYvH/download-(4).jpg" },
            { id: 15, name: "Signature Collection Tee", old: 899, price: 299, img: "https://i.postimg.cc/wxDGBTKT/images.jpg" }
        ];

        let currentUser = JSON.parse(localStorage.getItem('anzow_active_user')) || null;
        let wishlist = JSON.parse(localStorage.getItem('anzow_wishlist')) || [];
        let authMode = 'login';
        let selectedSize = null;

        function initSlider() {
            const slider = document.getElementById('hero-slider');
            const showcaseProducts = products.slice(0, 4); 
            
            showcaseProducts.forEach((p, index) => {
                const slide = document.createElement('div');
                slide.className = `hero-slide ${index === 0 ? 'active' : ''}`;
                slide.style.backgroundImage = `url('${p.img}')`;
                slide.innerHTML = `
                    <div class="hero-overlay">
                        <h2>FEATURED: ${p.name}</h2>
                    </div>
                `;
                slide.onclick = () => showProductDetail(p.id);
                slider.appendChild(slide);
            });

            let currentSlide = 0;
            const allSlides = document.querySelectorAll('.hero-slide');
            
            setInterval(() => {
                allSlides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % allSlides.length;
                allSlides[currentSlide].classList.add('active');
            }, 4000);
        }

        function toggleAuth(show) {
            document.getElementById('auth-overlay').style.display = show ? 'block' : 'none';
            renderAuth();
        }

        function renderAuth() {
            const container = document.getElementById('auth-container');
            if (currentUser) {
                const wishItems = products.filter(p => wishlist.includes(p.id));
                container.innerHTML = `
                    <h2 style="font-family:'Cinzel'">MY PROFILE</h2>
                    <p style="letter-spacing:1px">Member: <b>${currentUser.email}</b></p>
                    <h3 style="margin-top:50px; font-family:'Cinzel'; border-bottom:1px solid #eee; padding-bottom:10px; letter-spacing:2px">WISHLIST</h3>
                    <div class="wishlist-grid">
                        ${wishItems.length ? wishItems.map(p => `
                            <div class="wish-item">
                                <img src="${p.img}">
                                <div style="flex:1">
                                    <div style="font-size:11px; font-weight:700; text-transform:uppercase">${p.name}</div>
                                    <div style="color:var(--lp-gold); font-weight:700">₹${p.price}</div>
                                    <div onclick="showProductDetail(${p.id})" style="font-size:10px; color:var(--lp-navy); font-weight:700; cursor:pointer">VIEW PRODUCT</div>
                                </div>
                                <div style="cursor:pointer; color:#ccc; font-size:20px" onclick="toggleWishlist(${p.id})">×</div>
                            </div>
                        `).join('') : '<p style="grid-column:1/-1; padding:40px; color:#aaa">Your boutique is empty.</p>'}
                    </div>
                    <button class="btn-main btn-outline" onclick="handleLogout()">Sign Out</button>
                    <p class="auth-toggle" onclick="toggleAuth(false)" style="cursor:pointer; margin-top:20px">RETURN TO STORE</p>
                `;
            } else {
                container.innerHTML = `
                    <h2 style="font-family:'Cinzel'">${authMode === 'login' ? 'SIGN IN' : 'CREATE PROFILE'}</h2>
                    <input type="email" id="authEmail" class="auth-input" placeholder="EMAIL ADDRESS">
                    <input type="password" id="authPass" class="auth-input" placeholder="PASSWORD">
                    <button class="btn-main" onclick="processAuth()">${authMode === 'login' ? 'Login' : 'Join Now'}</button>
                    <p class="auth-toggle" onclick="authMode = authMode === 'login' ? 'signup' : 'login'; renderAuth();" style="cursor:pointer; margin-top:20px">
                        ${authMode === 'login' ? 'New to Anzow? Create account' : 'Already have an account? Login'}
                    </p>
                    <p class="auth-toggle" onclick="toggleAuth(false)" style="cursor:pointer; margin-top:10px">CLOSE</p>
                `;
            }
        }

        function processAuth() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            if(!email.includes('@') || pass.length < 6) return alert("Please enter valid credentials");
            const db = JSON.parse(localStorage.getItem('anzow_users_db')) || [];
            if(authMode === 'signup') {
                if(db.find(u => u.email === email)) return alert("Account exists");
                db.push({email, pass});
                localStorage.setItem('anzow_users_db', JSON.stringify(db));
                alert("Account created. Please login.");
                authMode = 'login';
                renderAuth();
            } else {
                const user = db.find(u => u.email === email && u.pass === pass);
                if(user) {
                    currentUser = user;
                    localStorage.setItem('anzow_active_user', JSON.stringify(user));
                    document.getElementById('acc-label').innerText = "PROFILE";
                    toggleAuth(false);
                } else alert("Invalid credentials");
            }
        }

        function handleLogout() {
            localStorage.removeItem('anzow_active_user');
            currentUser = null;
            document.getElementById('acc-label').innerText = "ACCOUNT";
            renderAuth();
        }

        function toggleWishlist(id) {
            const index = wishlist.indexOf(id);
            if(index > -1) wishlist.splice(index, 1);
            else wishlist.push(id);
            localStorage.setItem('anzow_wishlist', JSON.stringify(wishlist));
            renderProducts(document.getElementById('searchInput').value.toLowerCase());
            if(document.getElementById('auth-overlay').style.display === 'block') renderAuth();
        }

        function handleSearch() {
            renderProducts(document.getElementById('searchInput').value.toLowerCase());
        }

        function renderProducts(filter = "") {
            const grid = document.getElementById('grid');
            const filtered = products.filter(p => p.name.toLowerCase().includes(filter));
            
            // Search Feedback Added
            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #999;">No items found matching "${filter}".</div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => {
                const isWished = wishlist.includes(p.id) ? 'active' : '';
                const discount = Math.round(((p.old - p.price) / p.old) * 100);
                return `
                <div class="product-card">
                    <div class="img-box">
                        <div class="offer-badge">${discount}% OFF</div>
                        <div class="heart-btn ${isWished}" onclick="event.stopPropagation(); toggleWishlist(${p.id})">
                            <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                        <img src="${p.img}" onclick="showProductDetail(${p.id})" style="cursor:zoom-in">
                    </div>
                    <div class="details" onclick="showProductDetail(${p.id})" style="cursor:pointer">
                        <div class="p-name">${p.name}</div>
                        <div class="p-price">₹${p.price} <span class="old-price">₹${p.old}</span></div>
                        <button class="order-btn">View Options</button>
                    </div>
                </div>`;
            }).join('');
        }

        function showProductDetail(id) {
            const product = products.find(p => p.id === id);
            const overlay = document.getElementById('product-detail-overlay');
            const content = document.getElementById('detail-content');
            
            overlay.scrollTop = 0; // Scroll to top added
            selectedSize = null;

            content.innerHTML = `
                <div class="detail-img"><img src="${product.img}"></div>
                <div class="detail-info">
                    <h1 style="font-family:'Cinzel'; letter-spacing:4px;">${product.name}</h1>
                    <p style="color:var(--lp-gold); font-size:24px; font-weight:700;">₹${product.price} <span class="old-price">₹${product.old}</span></p>
                    <p style="color:#666; line-height:1.6; font-size:14px;">ANZOW Signature Fit. Premium craftsmanship for ultimate comfort.</p>
                    <h4 style="margin-top:30px; letter-spacing:2px; font-size:12px;">CHOOSE SIZE</h4>
                    <div class="size-selector">
                        ${['S', 'M', 'L', 'XL', 'XXL'].map(size => `<div class="size-btn" onclick="selectSize(this, '${size}')">${size}</div>`).join('')}
                    </div>
                    <button class="btn-main" onclick="sendWhatsApp(${product.id})">ORDER ON WHATSAPP</button>
                </div>
            `;
            overlay.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function selectSize(element, size) {
            document.querySelectorAll('.size-btn').forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
            selectedSize = size;
        }

        function closeProductDetail() {
            document.getElementById('product-detail-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function sendWhatsApp(id) {
            if(!selectedSize) return alert("Select a size first");
            const product = products.find(p => p.id === id);
            const text = `Hello ANZOW! I want to order:\n\n*Product:* ${product.name}\n*Size:* ${selectedSize}\n*Price:* ₹${product.price}`;
            window.open(`https://wa.me/919605170151?text=${encodeURIComponent(text)}`, '_blank');
        }

        // Start App
        if(currentUser) document.getElementById('acc-label').innerText = "PROFILE";
        renderProducts();
        initSlider();
    </script>
</body>
</html>
